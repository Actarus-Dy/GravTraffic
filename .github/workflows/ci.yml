# GravTraffic CI Pipeline
# Runs on push to main and all PRs

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff>=0.2
      - run: ruff check gravtraffic/ tests/
      - run: ruff format --check gravtraffic/ tests/

  test:
    name: Test (fast suite)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,api]"
      - name: Run fast test suite
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_calibration_pure.py \
            --ignore=tests/test_calibration_unified.py \
            --ignore=tests/test_corridor_rivoli.py \
            -v --tb=short --junitxml=test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t gravtraffic:ci .
      - name: Smoke test
        run: |
          docker run -d --name gt -p 8000:8000 gravtraffic:ci
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
          curl -sf http://localhost:8000/health || exit 1
          curl -sf http://localhost:8000/api/v1/status || exit 1
          docker stop gt
